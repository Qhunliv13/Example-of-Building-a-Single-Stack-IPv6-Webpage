worker_processes  2;

error_log  C:/webroot/logs/nginx_error.log warn;
pid        C:/nginx/nginx-1.26.2/logs/nginx.pid;

events {
    worker_connections  1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';

    access_log  C:/webroot/logs/nginx_access.log  main;

    sendfile        on;
    server_names_hash_bucket_size 64;
    keepalive_timeout  65;
    gzip  on;
    gzip_types text/plain text/css application/json application/javascript;

    # ---- HTTPS (formatconversion) ----
    server {
        listen 443 ssl;
        listen [::]:443 ssl;
        server_name formatconversion.liang16.me;
        ssl_certificate C:/nginx/letsencrypt/live/formatconversion.liang16.me/fullchain.pem;
        ssl_certificate_key C:/nginx/letsencrypt/live/formatconversion.liang16.me/privkey.pem;
        location / {
            proxy_pass http://127.0.0.1:5000/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 300;
            proxy_buffering off;
        }
    }

    # ---- HTTPS (liang16.me) ----
    server {
        listen 443 ssl;
        listen [::]:443 ssl;
        server_name liang16.me;
        ssl_certificate C:/nginx/letsencrypt/live/liang16.me/fullchain.pem;
        ssl_certificate_key C:/nginx/letsencrypt/live/liang16.me/privkey.pem;
        location / {
            proxy_pass http://127.0.0.1:5000/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 300;
            proxy_buffering off;
            client_max_body_size 200m;
        }
    }

    # ---- HTTPS (self-signed) ----
    server {
        listen 443 ssl;
        listen [::]:443 ssl;
        server_name direct.liang16.me;
        ssl_certificate C:/nginx/letsencrypt/live/direct.liang16.me/fullchain.pem;
        ssl_certificate_key C:/nginx/letsencrypt/live/direct.liang16.me/privkey.pem;
        location / { root C:/webroot/static; index index.html; try_files $uri $uri/ =404; }
        location /ws { proxy_pass http://127.0.0.1:8765; proxy_http_version 1.1; proxy_buffering off; proxy_set_header Upgrade $http_upgrade; proxy_set_header Connection "upgrade"; proxy_set_header Host $host; proxy_read_timeout 86400; }
        location /audio/ { proxy_pass http://127.0.0.1:8767; proxy_http_version 1.1; proxy_buffering off; proxy_set_header Upgrade $http_upgrade; proxy_set_header Connection "upgrade"; proxy_set_header Host $host; proxy_read_timeout 86400; }
        location /agent { proxy_pass http://127.0.0.1:9000; proxy_http_version 1.1; proxy_buffering off; proxy_set_header Upgrade $http_upgrade; proxy_set_header Connection "upgrade"; proxy_set_header Host $host; proxy_read_timeout 86400; }
        location /h264 { proxy_pass http://127.0.0.1:8766; proxy_http_version 1.1; proxy_buffering off; proxy_set_header Upgrade $http_upgrade; proxy_set_header Connection "upgrade"; proxy_set_header Host $host; proxy_read_timeout 86400; }
        error_page 500 502 503 504 /50x.html;
        location = /50x.html { root C:/webroot/static; }
    }

    # ---- HTTP (for Cloudflare Flexible SSL: Cloudflare handles HTTPS, connects to us via HTTP) ----
    server {
        listen 80;
    listen 8080;
    listen [::]:80;
    listen [::]:8080;
        server_name  liang16.me www.liang16.me direct.liang16.me desktop.liang16.me formatconversion.liang16.me;

        # Static files
        location / {
            root   C:/webroot/static;
            index  index.html index.htm;
            try_files $uri $uri/ =404;
        }
        location /formatconversion.html {
            proxy_pass http://127.0.0.1:5000/formatconversion.html;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 300;
            client_max_body_size 200m;
        }
        location /convert {
            proxy_pass http://127.0.0.1:5000/convert;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 300;
            client_max_body_size 200m;
        }
        location = /visitors_geo.json { deny all; }
        location = /hajimi.html { alias C:/GD/game/HTML/chess/index.html; }
        location = /something_fun.html { alias C:/GD/game/HTML/chess/index.html; }
        location = /40c4fb460f663a222e75b9880dc9602e.mp4 { alias C:/GD/game/HTML/chess/40c4fb460f663a222e75b9880dc9602e.mp4; }

        # Node.js API
        location /api/node/ {
            proxy_pass http://127.0.0.1:3001/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
        }

        # Python API
        location /api/python/ {
            proxy_pass http://127.0.0.1:3002/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
        }

        # Go API
        location /api/go/ {
            proxy_pass http://127.0.0.1:3003/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
        }

        # Screen share WebSocket - JPEG (port 8765)
        location /ws {
            proxy_pass http://127.0.0.1:8765;
            proxy_http_version 1.1;
            proxy_buffering off;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 86400;
        }

        # Audio WebSocket
        location /audio/ {
            proxy_pass http://127.0.0.1:8767;
            proxy_http_version 1.1;
            proxy_buffering off;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_read_timeout 86400;
        }

        # Remote control agent WebSocket
        location /agent {
            proxy_pass http://127.0.0.1:9000;
            proxy_http_version 1.1;
            proxy_buffering off;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_read_timeout 86400;
        }

        # Cloudflare proxy for GitHub access
        location /proxy/ {
            proxy_pass http://127.0.0.1:8899/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 60;
        }

        # Screen share WebSocket - H.264 GPU (port 8766)
        location /h264 {
            proxy_pass http://127.0.0.1:8766;
            proxy_http_version 1.1;
            proxy_buffering off;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 86400;
        }

        error_page   500 502 503 504  /50x.html;
        location = /50x.html {
            root   C:/webroot/static;
        }
    }
}


